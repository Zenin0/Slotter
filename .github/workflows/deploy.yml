name: Deploy to VPS (SSH Password)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy via SSH password
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
              
              set -e

              APP_DIR="${{ secrets.APP_DIR }}"

              if [ ! -d "$APP_DIR/.git" ]; then
                echo "No git repo found, cloning fresh..."
                git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
              fi
              
              cd "$APP_DIR"
              
              git pull origin main
              
              docker compose -f ./docker/compose.yaml down || true
              docker compose -f ./docker/compose.yaml up -d --build --force-recreate --remove-orphans
              
              docker system prune -f

          EOF
